name: Delivery

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build production bundle
        run: npm run build

      - name: Prepare release bundle
        run: |
          mkdir -p release
          cp -R dist release/dist
          cp -R server release/server
          cp package.json package-lock.json .env.example README.md release/

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: memento-release-bundle
          path: release
          retention-days: 14
